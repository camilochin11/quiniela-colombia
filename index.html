<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiniela Colombia · Mundial 2026</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; min-height: 100vh; }
.app { max-width: 480px; margin: 0 auto; background: #fff; min-height: 100vh; box-shadow: 0 0 40px rgba(0,0,0,0.08); }
.hdr { background: linear-gradient(135deg, #003087 0%, #001a4d 100%); color: #fff; text-align: center; padding: 22px 16px 16px; }
.hdr-flag { font-size: 36px; margin-bottom: 6px; }
.hdr h1 { font-size: 20px; font-weight: 700; color: #FCD116; letter-spacing: -0.3px; }
.hdr p { font-size: 13px; color: rgba(255,255,255,0.65); margin-top: 3px; }
.tabs { display: flex; background: #fff; border-bottom: 1px solid #e8e8e4; position: sticky; top: 0; z-index: 20; }
.tab { flex: 1; padding: 11px 4px 10px; font-size: 11px; font-weight: 600; background: none; border: none; color: #888; border-bottom: 2.5px solid transparent; cursor: pointer; letter-spacing: 0.02em; text-transform: uppercase; }
.tab.on { color: #003087; border-bottom-color: #FCD116; }
.sec { display: none; padding: 14px 12px 40px; }
.sec.on { display: block; }
.card { background: #fff; border: 1px solid #e8e8e4; border-radius: 12px; padding: 14px; margin-bottom: 12px; }
.card-title { font-size: 14px; font-weight: 600; color: #1a1a1a; margin-bottom: 10px; }
label { font-size: 13px; color: #666; display: block; margin-bottom: 6px; }
select, input[type=text] { width: 100%; padding: 9px 12px; font-size: 14px; border: 1px solid #ddd; border-radius: 8px; background: #fafafa; color: #1a1a1a; outline: none; font-family: inherit; }
select:focus, input[type=text]:focus { border-color: #003087; background: #fff; }
input[type=number] { width: 52px; height: 46px; text-align: center; font-size: 21px; font-weight: 700; border: 1.5px solid #ddd; border-radius: 8px; background: #fafafa; color: #1a1a1a; outline: none; font-family: inherit; -moz-appearance: textfield; padding: 0; }
input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
input[type=number]:focus { border-color: #003087; background: #fff; }
input[type=number]:disabled { opacity: 0.4; background: #f0f0f0; }
.phase-badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 4px; background: #e8f0fb; color: #003087; margin-bottom: 8px; }
.phase-admin { background: #fff8e1; color: #7c5a00; }
.match-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.match-date { font-size: 12px; color: #888; }
.pts-tag { margin-left: auto; font-size: 12px; font-weight: 600; padding: 2px 8px; border-radius: 4px; }
.pts-exact { background: #dcfce7; color: #166534; }
.pts-res { background: #dbeafe; color: #1e3a8a; }
.pts-none { background: #f3f4f6; color: #6b7280; }
.score-row { display: grid; grid-template-columns: 1fr 52px 16px 52px 1fr; align-items: center; gap: 8px; }
.team { font-size: 13px; font-weight: 600; color: #1a1a1a; }
.team-l { text-align: right; }
.team-r { text-align: left; }
.vs { text-align: center; font-size: 12px; color: #aaa; font-weight: 600; }
.real-result { margin-top: 8px; text-align: center; font-size: 12px; color: #888; }
.btn { width: 100%; padding: 11px; border-radius: 10px; border: 1px solid #ddd; background: #fafafa; font-size: 14px; font-weight: 600; color: #1a1a1a; cursor: pointer; font-family: inherit; transition: all 0.15s; margin-bottom: 8px; }
.btn:hover { background: #f0f0f0; }
.btn:last-child { margin-bottom: 0; }
.btn-primary { background: #003087; color: #FCD116; border-color: #003087; }
.btn-primary:hover { background: #001a4d; border-color: #001a4d; }
.btn-sm { padding: 7px 14px; width: auto; font-size: 13px; margin-bottom: 0; }
.btn-ghost { background: transparent; color: #666; border-color: #ddd; font-size: 13px; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.stat-box { background: #f5f5f0; border-radius: 10px; padding: 14px; text-align: center; }
.stat-n { font-size: 28px; font-weight: 700; color: #003087; }
.stat-l { font-size: 12px; color: #888; margin-top: 2px; }
.pts-legend { background: #f9f9f6; border-radius: 10px; border: 1px solid #e8e8e4; padding: 10px 14px; margin-bottom: 12px; font-size: 13px; color: #555; line-height: 2.1; }
.lb-row { display: flex; align-items: center; gap: 10px; padding: 12px 0; border-bottom: 1px solid #f0f0ec; }
.lb-row:last-child { border-bottom: none; }
.lb-row.me { background: #fffbeb; margin: 0 -14px; padding: 12px 14px; }
.rank-badge { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
.r1 { background: #FAEEDA; color: #B87514; }
.r2 { background: #e8e8e4; color: #5F5E5A; }
.r3 { background: #F5C4B3; color: #7B4014; }
.rn { background: #f0f0ec; color: #888; }
.lb-name { flex: 1; font-size: 14px; font-weight: 600; color: #1a1a1a; }
.lb-sub { font-size: 12px; color: #888; font-weight: 400; }
.lb-pts-n { font-size: 22px; font-weight: 700; color: #003087; }
.lb-pts-l { font-size: 11px; color: #888; }
.chip { display: inline-flex; align-items: center; gap: 5px; background: #f0f0ec; border: 1px solid #e0e0da; border-radius: 20px; padding: 4px 10px; font-size: 13px; color: #1a1a1a; }
.chip-x { background: none; border: none; color: #aaa; font-size: 18px; line-height: 1; padding: 0; cursor: pointer; font-family: inherit; }
.chip-x:hover { color: #CE1126; }
.chips-wrap { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; min-height: 32px; }
.match-edit-row { display: grid; grid-template-columns: 1fr 1fr 70px 34px; gap: 6px; margin-bottom: 8px; }
.match-edit-row input[type=text] { font-size: 13px; padding: 7px 10px; }
.del-btn { background: #fff0f0; color: #CE1126; border: 1px solid #ffd0d0; border-radius: 8px; font-size: 18px; cursor: pointer; }
.admin-note { background: #fff8e1; border: 1px solid #f0d060; border-radius: 10px; padding: 10px 14px; font-size: 13px; color: #7c5a00; margin-bottom: 14px; }
.saved-pred { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid #f0f0ec; }
.saved-pred:last-child { border-bottom: none; }
.saved-match { font-size: 13px; color: #666; }
.saved-score { font-size: 13px; font-weight: 600; color: #1a1a1a; display: flex; align-items: center; gap: 6px; }
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); padding: 10px 20px; border-radius: 10px; font-size: 13px; font-weight: 600; z-index: 999; opacity: 0; transition: opacity 0.2s; pointer-events: none; box-shadow: 0 4px 20px rgba(0,0,0,0.15); white-space: nowrap; }
.toast.ok { background: #dcfce7; color: #166534; }
.toast.err { background: #fee2e2; color: #991b1b; }
.toast.show { opacity: 1; }
.loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 300px; color: #888; font-size: 14px; gap: 12px; }
.spinner { width: 32px; height: 32px; border: 3px solid #e0e0da; border-top-color: #003087; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty { text-align: center; padding: 30px 0; color: #aaa; font-size: 14px; }
.divider { border-top: 1px solid #f0f0ec; margin: 12px 0; }
.setup-banner { background: linear-gradient(135deg, #003087, #001a4d); color: #fff; border-radius: 12px; padding: 16px; margin-bottom: 14px; }
.setup-banner h3 { font-size: 15px; font-weight: 700; color: #FCD116; margin-bottom: 6px; }
.setup-banner p { font-size: 13px; color: rgba(255,255,255,0.75); line-height: 1.5; }
.setup-banner code { background: rgba(255,255,255,0.15); color: #FCD116; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
.needs-setup { text-align: center; padding: 40px 20px; }
.needs-setup h2 { font-size: 18px; font-weight: 700; color: #003087; margin-bottom: 8px; }
.needs-setup p { font-size: 14px; color: #666; line-height: 1.6; margin-bottom: 16px; }
.needs-setup ol { text-align: left; font-size: 13px; color: #555; line-height: 2; padding-left: 20px; margin-bottom: 16px; }
.needs-setup a { color: #003087; font-weight: 600; }
.pin-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; min-height: 320px; background: #fff; border-radius: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; padding: 32px 24px; z-index: 5; }
.pin-title { font-size: 16px; font-weight: 700; color: #1a1a1a; text-align: center; }
.pin-sub { font-size: 13px; color: #888; text-align: center; margin-top: -8px; }
.pin-dots { display: flex; gap: 12px; margin: 4px 0; }
.pin-dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid #ccc; background: #fff; transition: all 0.15s; }
.pin-dot.filled { background: #003087; border-color: #003087; }
.pin-dot.error { background: #CE1126; border-color: #CE1126; }
.pin-keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; max-width: 240px; }
.pin-key { padding: 14px; font-size: 18px; font-weight: 600; border: 1.5px solid #e0e0da; border-radius: 10px; background: #fafafa; color: #1a1a1a; cursor: pointer; font-family: inherit; transition: all 0.1s; text-align: center; }
.pin-key:hover { background: #f0f0ea; }
.pin-key:active { transform: scale(0.94); background: #e8e8e2; }
.pin-key.del { font-size: 20px; color: #888; }
.pin-error { font-size: 13px; color: #CE1126; font-weight: 600; min-height: 18px; }
.locked-tab { opacity: 0.45; }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════
     INSTRUCCIONES DE CONFIGURACIÓN (leer antes de subir)
     ═══════════════════════════════════════════════════
  
  Para que todos los jugadores compartan la misma tabla en tiempo real,
  necesitas configurar Firebase (es GRATIS):

  1. Ve a https://console.firebase.google.com/
  2. Crea un proyecto nuevo (ej. "quiniela-colombia")
  3. En el panel izquierdo: "Realtime Database" → "Crear base de datos"
     → elige "Iniciar en modo de prueba" → Listo
  4. En el panel izquierdo: "Configuración del proyecto" (ícono ⚙️)
     → "Tus apps" → ícono </> (Web)
     → Registra la app (nombre cualquiera) → copia la config
  5. Reemplaza FIREBASE_CONFIG abajo con tu config real
  6. Sube el archivo a GitHub Pages y comparte el link

  Si NO configuras Firebase, la app funciona igual pero
  cada jugador tendrá su propia copia local (sin tabla compartida).
  ═══════════════════════════════════════════════════ -->

<div class="app">
  <div class="hdr">
    <div class="hdr-flag">🇨🇴</div>
    <h1>Quiniela Colombia · Mundial 2026</h1>
    <p id="hdr-sub">Cargando...</p>
  </div>

  <div class="tabs">
    <button class="tab on" onclick="nav('predict')">⚽ Predecir</button>
    <button class="tab" onclick="nav('table')">🏆 Tabla</button>
    <button class="tab" onclick="navProtected('admin')">⚙️ Admin 🔒</button>
    <button class="tab" onclick="navProtected('config')">👥 Jugadores 🔒</button>
  </div>

  <div id="sec-predict" class="sec on">
    <div id="predict-inner">
      <div class="loading-screen"><div class="spinner"></div>Cargando...</div>
    </div>
  </div>

  <div id="sec-table" class="sec">
    <div id="table-inner">
      <div class="loading-screen"><div class="spinner"></div>Cargando...</div>
    </div>
  </div>

  <div id="sec-admin" class="sec">
    <div id="admin-inner">
      <div class="loading-screen"><div class="spinner"></div>Cargando...</div>
    </div>
  </div>

  <div id="sec-config" class="sec">
    <div id="config-inner">
      <div class="loading-screen"><div class="spinner"></div>Cargando...</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// ═══════════════════════════════════════════════════
// REEMPLAZA ESTO con tu configuración de Firebase
// ═══════════════════════════════════════════════════
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyDiXa0k8GxutCOJrLBktcEErCqhlgrXL9Q",
  authDomain: "quiniela-colombia.firebaseapp.com",
  databaseURL: "https://quiniela-colombia-default-rtdb.firebaseio.com",
  projectId: "quiniela-colombia",
  storageBucket: "quiniela-colombia.firebasestorage.app",
  messagingSenderId: "428244757286",
  appId: "1:428244757286:web:a461f965ced7c05a5c6fe7"
};
// ═══════════════════════════════════════════════════

const DEF_MATCHES = [
  {id:1,home:'Colombia',away:'Ecuador',phase:'Grupo A',date:'17 Jun'},
  {id:2,home:'Colombia',away:'Arabia Saudita',phase:'Grupo A',date:'23 Jun'},
  {id:3,home:'Uruguay',away:'Colombia',phase:'Grupo A',date:'27 Jun'},
  {id:4,home:'Colombia',away:'TBD',phase:'Octavos',date:'30 Jun'},
  {id:5,home:'Colombia',away:'TBD',phase:'Cuartos',date:'7 Jul'},
  {id:6,home:'Colombia',away:'TBD',phase:'Semifinal',date:'14 Jul'},
  {id:7,home:'Colombia',away:'TBD',phase:'Final',date:'19 Jul'},
];

let players=[], matches=[], preds={}, results={}, locked={};
let curPlayer='', localPreds={}, localResults={};
let db=null, useFirebase=false;

// ── Firebase init ────────────────────────────────
function initFirebase(){
  try {
    if(FIREBASE_CONFIG.apiKey === 'TU_API_KEY') {
      useFirebase=false;
      return false;
    }
    firebase.initializeApp(FIREBASE_CONFIG);
    db=firebase.database();
    useFirebase=true;
    return true;
  } catch(e) { useFirebase=false; return false; }
}

// ── Storage helpers ───────────────────────────────
async function dbGet(path){
  if(!useFirebase) return JSON.parse(localStorage.getItem('q26_'+path)||'null');
  const snap=await db.ref(path).get();
  return snap.exists()?snap.val():null;
}
async function dbSet(path,val){
  if(!useFirebase){ localStorage.setItem('q26_'+path,JSON.stringify(val)); return; }
  await db.ref(path).set(val);
}
function dbListen(path,cb){
  if(!useFirebase) return;
  db.ref(path).on('value',snap=>cb(snap.exists()?snap.val():null));
}

// ── Boot ──────────────────────────────────────────
async function boot(){
  const fbOk = initFirebase();
  const [pl,ma,pr,re,lk] = await Promise.all([
    dbGet('players'), dbGet('matches'),
    dbGet('predictions'), dbGet('results'), dbGet('locked')
  ]);
  players = pl ? Object.values(pl) : [];
  matches = ma ? Object.values(ma) : DEF_MATCHES;
  preds   = pr || {};
  results = re || {};
  locked  = lk || {};
  localResults = {...results};
  document.getElementById('hdr-sub').textContent =
    players.length + ' participantes · ' + (fbOk?'Tiempo real':'Modo local');

  // Live listeners
  if(useFirebase){
    dbListen('predictions', v=>{ if(v){preds=v;} renderTable(); renderPredForm(); });
    dbListen('results',     v=>{ if(v){results=v;localResults={...v};} renderTable(); renderPredForm(); renderAdmin(); });
    dbListen('players',     v=>{ if(v){players=Object.values(v);} renderPlayerSelect(); renderTable(); renderConfig(); document.getElementById('hdr-sub').textContent=players.length+' participantes · Tiempo real'; });
    dbListen('locked',      v=>{ locked=v||{}; renderPredForm(); renderAdmin(); });
  }
  renderAll();
}

function renderAll(){
  renderPlayerSelect();
  renderTable();
  renderAdmin();
  renderConfig();
}

const ADMIN_PIN = '0415';
let adminUnlocked = false;
let pinTarget = '';
let pinInput = '';

// ── Nav ───────────────────────────────────────────
function nav(t){
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('on',['predict','table','admin','config'][i]===t));
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.getElementById('sec-'+t).classList.add('on');
}

function navProtected(t){
  if(adminUnlocked){ nav(t); return; }
  pinTarget=t; pinInput='';
  showPinOverlay(t);
}

function showPinOverlay(t){
  nav(t);
  const sec=document.getElementById('sec-'+t);
  sec.style.position='relative';
  const old=sec.querySelector('.pin-overlay');
  if(old) old.remove();
  const div=document.createElement('div');
  div.className='pin-overlay';
  div.id='pin-overlay';
  div.innerHTML=`
    <div style="font-size:32px">🔒</div>
    <div class="pin-title">Zona de administrador</div>
    <div class="pin-sub">Ingresa el PIN de 4 dígitos</div>
    <div class="pin-dots" id="pin-dots">
      <div class="pin-dot" id="pd0"></div>
      <div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div>
      <div class="pin-dot" id="pd3"></div>
    </div>
    <div class="pin-error" id="pin-err"></div>
    <div class="pin-keypad">
      ${[1,2,3,4,5,6,7,8,9,'',0,'⌫'].map(k=>
        k===''?`<div></div>`:
        `<button class="pin-key${k==='⌫'?' del':''}" onclick="pinPress('${k}')">${k}</button>`
      ).join('')}
    </div>
  `;
  sec.insertBefore(div, sec.firstChild);
}

function pinPress(k){
  if(k==='⌫'){ pinInput=pinInput.slice(0,-1); updateDots(); return; }
  if(pinInput.length>=4) return;
  pinInput+=k;
  updateDots();
  if(pinInput.length===4) setTimeout(checkPin,120);
}

function updateDots(){
  for(let i=0;i<4;i++){
    const d=document.getElementById('pd'+i);
    if(d){ d.className='pin-dot'+(i<pinInput.length?' filled':''); }
  }
}

function checkPin(){
  if(pinInput===ADMIN_PIN){
    adminUnlocked=true;
    const ov=document.getElementById('pin-overlay');
    if(ov) ov.remove();
    toast('Acceso concedido ✓','ok');
  } else {
    for(let i=0;i<4;i++){
      const d=document.getElementById('pd'+i);
      if(d) d.className='pin-dot error';
    }
    document.getElementById('pin-err').textContent='PIN incorrecto, intenta de nuevo';
    setTimeout(()=>{ pinInput=''; updateDots(); document.getElementById('pin-err').textContent=''; },900);
  }
}

// ── Points ────────────────────────────────────────
function calcPts(pred,real){
  if(!pred||real===undefined) return null;
  if(pred.h===real.h && pred.a===real.a) return 3;
  const pw=pred.h>pred.a?1:pred.h<pred.a?-1:0;
  const rw=real.h>real.a?1:real.h<real.a?-1:0;
  return pw===rw?1:0;
}

// ── PREDICT ───────────────────────────────────────
function renderPlayerSelect(){
  const wrap=document.getElementById('predict-inner');
  let html=`<div class="card">
    <label>Tu nombre</label>
    <select id="sel-player" onchange="onPlayerChange()">
      <option value="">— elige tu nombre —</option>
      ${players.map(p=>`<option value="${esc(p)}"${p===curPlayer?' selected':''}>${esc(p)}</option>`).join('')}
    </select>
  </div><div id="pred-form"></div>`;
  wrap.innerHTML=html;
  renderPredForm();
}

function onPlayerChange(){
  curPlayer=document.getElementById('sel-player').value;
  localPreds = curPlayer ? {...(preds[curPlayer]||{})} : {};
  renderPredForm();
}

function renderPredForm(){
  const el=document.getElementById('pred-form');
  if(!el) return;
  if(!curPlayer){el.innerHTML='';return;}
  let html='';
  let pendingCount=0;
  matches.forEach(m=>{
    const savedP=(preds[curPlayer]||{})[m.id];
    const alreadySaved=savedP!==undefined;
    const hasRes=results[m.id]!==undefined;
    const isLocked=locked[m.id]===true;
    const inputLocked=isLocked||hasRes;
    const displayVal=alreadySaved?savedP:(localPreds[m.id]||{h:'',a:''});
    if(!inputLocked) pendingCount++;
    const pt=calcPts(savedP,results[m.id]);
    let ptHtml='';
    if(pt===3) ptHtml=`<span class="pts-tag pts-exact">+3 exacto 🎯</span>`;
    else if(pt===1) ptHtml=`<span class="pts-tag pts-res">+1 resultado ✅</span>`;
    else if(pt===0&&hasRes) ptHtml=`<span class="pts-tag pts-none">0 pts ❌</span>`;
    const lockBadge=isLocked&&!hasRes?`<span style="margin-left:auto;font-size:12px;color:#888;">🔒 cerrado</span>`:'';
    html+=`<div class="card" style="${inputLocked&&!hasRes?'background:#fafaf8;':''}">
      <div class="match-header">
        <span class="phase-badge">${esc(m.phase)}</span>
        <span class="match-date">${esc(m.date)}</span>
        ${ptHtml}${lockBadge}
      </div>
      <div class="score-row">
        <span class="team team-l">${esc(m.home)}</span>
        <input type="number" min="0" max="20" id="ph_${m.id}" value="${displayVal.h!==''?displayVal.h:''}" placeholder="0" ${inputLocked?'disabled':''}
          oninput="setLP(${m.id},'h',this.value)">
        <span class="vs">vs</span>
        <input type="number" min="0" max="20" id="pa_${m.id}" value="${displayVal.a!==''?displayVal.a:''}" placeholder="0" ${inputLocked?'disabled':''}
          oninput="setLP(${m.id},'a',this.value)">
        <span class="team team-r">${esc(m.away)}</span>
      </div>
      ${hasRes?`<div class="real-result">Resultado real: <strong>${results[m.id].h} – ${results[m.id].a}</strong></div>`:''}
    </div>`;
  });

  // Saved predictions summary
  const sp=preds[curPlayer]||{};
  let savedHtml='', total=0;
  matches.forEach(m=>{
    const p=sp[m.id]; if(!p) return;
    const pt2=calcPts(p,results[m.id]);
    if(pt2!==null) total+=pt2;
    const ptTag=pt2===3?`<span class="pts-tag pts-exact">+3</span>`:pt2===1?`<span class="pts-tag pts-res">+1</span>`:pt2===0?`<span class="pts-tag pts-none">0</span>`:'';
    savedHtml+=`<div class="saved-pred">
      <span class="saved-match">${esc(m.home)} vs ${esc(m.away)}</span>
      <span class="saved-score">${p.h}–${p.a} ${ptTag}</span>
    </div>`;
  });
  if(savedHtml){
    html+=`<div class="card">
      <div class="card-title">Tus predicciones guardadas</div>
      ${savedHtml}
      ${Object.keys(results).length>0?`<div class="divider"></div><div style="text-align:right;font-size:15px;font-weight:700;color:#003087">Total: ${total} pts</div>`:''}
    </div>`;
  }
  html+=pendingCount>0
    ?`<button class="btn btn-primary" onclick="savePredictions()">💾 Guardar predicciones (${pendingCount} pendientes)</button>`
    :`<div style="text-align:center;padding:12px;font-size:14px;color:#166534;background:#dcfce7;border-radius:10px;font-weight:600;">✅ Todas tus predicciones están guardadas</div>`;
  el.innerHTML=html;
}

function setLP(id,side,val){
  if(!localPreds[id]) localPreds[id]={h:0,a:0};
  localPreds[id][side]=Math.max(0,parseInt(val)||0);
}

async function savePredictions(){
  if(!curPlayer){toast('Elige tu nombre primero','err');return;}
  const existing=preds[curPlayer]||{};
  // Save/update any match that is not locked and doesn't have a real result yet
  // (includes both new predictions and edits to ones already saved)
  const newOnly={};
  Object.keys(localPreds).forEach(id=>{
    if(!locked[id] && !results[id]) newOnly[id]=localPreds[id];
  });
  if(Object.keys(newOnly).length===0){toast('No hay predicciones para guardar','err');return;}
  const updated={...preds,[curPlayer]:{...existing,...newOnly}};
  preds=updated;
  await dbSet('predictions',preds);
  renderPredForm();
  renderTable();
  toast('Predicciones guardadas ✓','ok');
}

// ── TABLE ─────────────────────────────────────────
function renderTable(){
  const el=document.getElementById('table-inner');
  if(!el) return;
  const played=Object.keys(results).length;
  let html=`<div class="stat-grid">
    <div class="stat-box"><div class="stat-n">${players.length}</div><div class="stat-l">Participantes</div></div>
    <div class="stat-box"><div class="stat-n">${played}</div><div class="stat-l">Partidos jugados</div></div>
  </div>
  <div class="pts-legend">
    🎯 Resultado exacto (ej. 2-1): <strong>3 pts</strong><br>
    ✅ Ganador/empate correcto (ej. predijo 1-0, fue 2-0): <strong>1 pt</strong><br>
    ❌ Sin acierto: <strong>0 pts</strong>
  </div>`;

  if(!players.length){
    html+=`<div class="empty">Agrega participantes en la pestaña Jugadores</div>`;
    el.innerHTML=html; return;
  }
  const ranked=players.map(p=>{
    let total=0,exact=0,res=0;
    matches.forEach(m=>{
      const pt=calcPts((preds[p]||{})[m.id],results[m.id]);
      if(pt===null) return;
      total+=pt; if(pt===3)exact++; else if(pt===1)res++;
    });
    return {name:p,total,exact,res};
  }).sort((a,b)=>b.total-a.total||b.exact-a.exact);

  html+=`<div class="card">`;
  ranked.forEach((p,i)=>{
    const rc=i===0?'r1':i===1?'r2':i===2?'r3':'rn';
    const isMe=p.name===curPlayer;
    html+=`<div class="lb-row${isMe?' me':''}">
      <div class="rank-badge ${rc}">${i+1}</div>
      <div style="flex:1">
        <div class="lb-name">${esc(p.name)}${isMe?' 👤':''}</div>
        <div class="lb-sub">${p.exact} exactos · ${p.res} resultados</div>
      </div>
      <div style="text-align:right">
        <div class="lb-pts-n">${p.total}</div>
        <div class="lb-pts-l">pts</div>
      </div>
    </div>`;
  });
  html+=`</div>`;
  if(!useFirebase){
    html+=`<button class="btn btn-ghost" onclick="refreshLocal()">↻ Actualizar tabla</button>`;
  }
  el.innerHTML=html;
}

async function refreshLocal(){
  const [pr,re]=await Promise.all([dbGet('predictions'),dbGet('results')]);
  if(pr) preds=pr;
  if(re){ results=re; localResults={...re}; }
  renderTable(); renderPredForm();
  toast('Tabla actualizada','ok');
}

// ── ADMIN ─────────────────────────────────────────
function renderAdmin(){
  const el=document.getElementById('admin-inner');
  if(!el) return;
  let html=`<div class="admin-note">🔒 Solo el organizador ingresa los resultados reales aquí.</div>`;
  matches.forEach(m=>{
    const r=localResults[m.id]||{h:'',a:''};
    const isLocked=locked[m.id]===true;
    html+=`<div class="card" style="${isLocked?'border-color:#fbbf24;':''}">
      <div class="match-header">
        <span class="phase-badge phase-admin">${esc(m.phase)}</span>
        <span class="match-date">${esc(m.date)}</span>
        <button onclick="toggleLock(${m.id})" style="margin-left:auto;padding:4px 12px;font-size:12px;font-weight:600;border-radius:6px;cursor:pointer;font-family:inherit;border:1px solid ${isLocked?'#f59e0b':'#86efac'};background:${isLocked?'#fff8e1':'#dcfce7'};color:${isLocked?'#92400e':'#166534'};">
          ${isLocked?'🔒 Cerrado · Abrir':'🔓 Abierto · Cerrar'}
        </button>
      </div>
      <div class="score-row">
        <span class="team team-l">${esc(m.home)}</span>
        <input type="number" min="0" max="20" id="rh_${m.id}" value="${r.h!==''?r.h:''}" placeholder="0"
          oninput="setLR(${m.id},'h',this.value)">
        <span class="vs">–</span>
        <input type="number" min="0" max="20" id="ra_${m.id}" value="${r.a!==''?r.a:''}" placeholder="0"
          oninput="setLR(${m.id},'a',this.value)">
        <span class="team team-r">${esc(m.away)}</span>
      </div>
    </div>`;
  });
  html+=`<button class="btn btn-primary" onclick="saveResults()">💾 Guardar resultados reales</button>`;
  el.innerHTML=html;
}

async function toggleLock(matchId){
  locked[matchId]=!locked[matchId];
  await dbSet('locked',locked);
  renderAdmin();
  renderPredForm();
  toast(locked[matchId]?'Partido cerrado 🔒':'Partido abierto 🔓', 'ok');
}

function setLR(id,side,val){
  if(!localResults[id]) localResults[id]={h:0,a:0};
  localResults[id][side]=Math.max(0,parseInt(val)||0);
}

async function saveResults(){
  results={...localResults};
  await dbSet('results',results);
  renderTable(); renderPredForm(); renderAdmin();
  toast('Resultados guardados ✓','ok');
}

// ── CONFIG ────────────────────────────────────────
function renderConfig(){
  const el=document.getElementById('config-inner');
  if(!el) return;
  let html=`<div class="card">
    <div class="card-title">Participantes (${players.length}/20)</div>
    <div class="chips-wrap" id="chips">
      ${players.length
        ? players.map(p=>`<div class="chip">${esc(p)}<button class="chip-x" onclick="removePlayer('${esc(p).replace(/'/g,"\\'")}')">×</button></div>`).join('')
        : '<span style="font-size:13px;color:#aaa">Sin participantes aún</span>'}
    </div>
    <div style="display:flex;gap:8px">
      <input type="text" id="new-pl" placeholder="Nombre del jugador" onkeydown="if(event.key==='Enter')addPlayer()">
      <button class="btn btn-sm btn-primary" onclick="addPlayer()">+ Agregar</button>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Partidos del torneo</div>
    <p style="font-size:12px;color:#888;margin-bottom:6px">Edita equipos, fase, fecha o elimina partidos</p>
    <div style="display:grid;grid-template-columns:1fr 1fr 70px 58px 34px;gap:6px;margin-bottom:6px">
      <span style="font-size:11px;color:#aaa;font-weight:600">Local</span>
      <span style="font-size:11px;color:#aaa;font-weight:600">Visitante</span>
      <span style="font-size:11px;color:#aaa;font-weight:600">Fase</span>
      <span style="font-size:11px;color:#aaa;font-weight:600">Fecha</span>
      <span></span>
    </div>
    <div id="matches-edit">
      ${matches.map((m,i)=>`<div style="display:grid;grid-template-columns:1fr 1fr 70px 58px 34px;gap:6px;margin-bottom:8px">
        <input type="text" value="${esc(m.home)}" placeholder="Local" onchange="updateMatch(${i},'home',this.value)" style="font-size:13px;padding:7px 8px">
        <input type="text" value="${esc(m.away)}" placeholder="Visitante" onchange="updateMatch(${i},'away',this.value)" style="font-size:13px;padding:7px 8px">
        <input type="text" value="${esc(m.phase)}" placeholder="Fase" onchange="updateMatch(${i},'phase',this.value)" style="font-size:13px;padding:7px 8px">
        <input type="text" value="${esc(m.date||'')}" placeholder="Fecha" onchange="updateMatch(${i},'date',this.value)" style="font-size:13px;padding:7px 8px">
        <button class="del-btn" onclick="removeMatch(${i})">×</button>
      </div>`).join('')}
    </div>
    <button class="btn btn-ghost btn-sm" onclick="addMatchCfg()" style="margin-top:6px">+ Partido</button>
  </div>`;
  el.innerHTML=html;
}

async function addPlayer(){
  const inp=document.getElementById('new-pl');
  const name=inp.value.trim();
  if(!name) return;
  if(players.length>=20){toast('Máximo 20 participantes','err');return;}
  if(players.includes(name)){toast('Ese nombre ya existe','err');return;}
  players.push(name);
  await dbSet('players',players);
  inp.value='';
  renderConfig(); renderPlayerSelect(); renderTable();
}

async function removePlayer(name){
  players=players.filter(p=>p!==name);
  await dbSet('players',players);
  renderConfig(); renderPlayerSelect(); renderTable();
}

async function updateMatch(idx,field,val){
  matches[idx][field]=val;
  await dbSet('matches',matches);
}

async function removeMatch(idx){
  matches.splice(idx,1);
  await dbSet('matches',matches);
  renderConfig(); renderAdmin(); renderPredForm();
}

async function addMatchCfg(){
  matches.push({id:Date.now(),home:'Colombia',away:'TBD',phase:'Fase',date:''});
  await dbSet('matches',matches);
  renderConfig();
}

// ── Helpers ───────────────────────────────────────
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function toast(msg,type='ok'){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='toast '+type+' show';
  setTimeout(()=>el.classList.remove('show'),2800);
}

// ── Start ─────────────────────────────────────────
boot();
</script>
</body>
</html>
